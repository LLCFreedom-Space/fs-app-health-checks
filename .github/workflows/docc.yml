name: Deploy DocC

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-14

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Select Xcode
      - name: Select Xcode 🧰
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. Build + symbol graphs
      - name: Build & Generate Symbol Graphs 🔨
        run: |
          echo "Building and generating symbol graphs..."
          mkdir -p .build/symbol-graphs

          swift build --target HealthChecks \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc .build/symbol-graphs \
            --quiet

      # 4. Generate DocC
      - name: Generate DocC 📚
        run: |
          echo "🔍 Searching for DocC catalog..."

          DOCC_CATALOG=$(find Sources \
            -type d \
            -name "*.docc" \
            -not -path "*/.build/*" \
            -not -path "*/checkouts/*" \
            | head -n 1)

          if [ -z "$DOCC_CATALOG" ]; then
            echo "❌ No .docc catalog found in Sources/"
            exit 1
          fi

          echo "✅ Using DocC catalog: $DOCC_CATALOG"

          echo "Running docc convert..."
          xcrun docc convert "$DOCC_CATALOG" \
            --additional-symbol-graph-dir .build/symbol-graphs \
            --transform-for-static-hosting \
            --hosting-base-path fs-app-health-checks \
            --output-path ./docs

      # 5. Перевірка що docs згенерились
      - name: Verify Docs ✅
        run: |
          if [ ! -d "docs" ] || [ -z "$(ls -A docs)" ]; then
            echo "❌ Docs generation failed or empty"
            exit 1
          fi
          echo "✅ Docs generated successfully"

      # 6. Redirect index
      - name: Add Redirect Index 🔗
        run: |
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      # 7. Upload artifact
      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # 8. Deploy
      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v4
