name: Deploy DocC

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-15

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Build DocC for HealthChecks 🛠
        run: |
          TMP_DOCS=$(mktemp -d)
          echo "Using temporary docs folder: $TMP_DOCS"

          # Генеруємо документацію тільки для target HealthChecks через Swift DocC Plugin
          swift package generate-documentation \
            --target HealthChecks \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path fs-app-health-checks \
            --output-path "$TMP_DOCS"

          # Копіюємо в docs для GitHub Pages
          rm -rf docs
          mkdir -p docs
          cp -R "$TMP_DOCS"/* docs/

          # Додаємо редірект на index.html
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
