name: Deploy DocC macOS

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-macos:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macOS-13

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Build macOS DocC 🛠
        run: |
          swift package resolve

          xcodebuild docbuild \
            -scheme fs-app-health-checks \
            -derivedDataPath /tmp/docbuild-macos

          xcrun docc process-archive \
            transform-for-static-hosting \
            /tmp/docbuild-macos/Build/Products/Debug/fs_app_health_checks.doccarchive \
            --output-path docs \
            --hosting-base-path fs-app-health-checks

          echo '<meta http-equiv="refresh" content="0; URL=./documentation/healthchecks/">' > docs/index.html

      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v1
        with:
          path: docs

      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v1
