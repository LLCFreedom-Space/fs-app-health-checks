name: Deploy DocC
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-14
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Build DocC 🛠
        run: |
          swift package resolve
          xcodebuild docbuild \
            -scheme fs-app-health-checks \
            -derivedDataPath /tmp/docbuild \
            -destination 'generic/platform=macOS'\
            -skipPackagePluginValidation \
            -disable-concurrent-docc
          $(xcrun --find docc) process-archive \
            transform-for-static-hosting \
            /tmp/docbuild/Build/Products/Debug/HealthChecks.doccarchive \
            --output-path docs \
            --hosting-base-path fs-app-health-checks
          echo "<script>window.location.href += \"/documentation/healthchecks\"</script>" > docs/index.html
      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v4
