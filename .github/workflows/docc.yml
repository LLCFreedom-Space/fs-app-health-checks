name: Deploy DocC

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-14

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Build DocC 🛠
        run: |
#          swift package resolve

          # Створюємо тимчасову папку для збірки, щоб уникнути проблем з правами
          TMP_DOCS=$(mktemp -d)
          echo "Using temporary docs folder: $TMP_DOCS"

          xcodebuild docbuild \
            -scheme fs-app-health-checks \
            -destination 'generic/platform=macOS' \
            -derivedDataPath /tmp/docbuild \
            DOCC_EXCLUDE_DEPENDENCIES=YES

          $(xcrun --find docc) process-archive \
            transform-for-static-hosting \
            /tmp/docbuild/Build/Products/Debug/HealthChecks.doccarchive \
            --output-path "$TMP_DOCS" \
            --hosting-base-path fs-app-health-checks

          # Копіюємо в docs для GitHub Pages
          rm -rf docs
          mkdir -p docs
          cp -R "$TMP_DOCS"/* docs/

          # Додаємо редірект на index.html
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
