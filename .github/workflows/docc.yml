name: Deploy DocC

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-14

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Select Xcode
      - name: Select Xcode 🧰
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. Build + symbol graphs
      - name: Build & Generate Symbol Graphs
        run: |
          echo "Building and generating symbol graphs..."
          mkdir -p .build/symbol-graphs

          swift build --target HealthChecks \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc .build/symbol-graphs \
            --quiet

      # 4. Run DocC directly
      - name: Generate DocC 📚
        run: |
          echo "Running docc convert..."

          DOCC_CATALOG=$(find . -name "*.docc" | head -n 1)

          if [ -z "$DOCC_CATALOG" ]; then
            echo "❌ No .docc catalog found"
            exit 1
          fi

          echo "Using catalog: $DOCC_CATALOG"

          docc convert "$DOCC_CATALOG" \
            --additional-symbol-graph-dir .build/symbol-graphs \
            --transform-for-static-hosting \
            --hosting-base-path fs-app-health-checks \
            --output-path ./docs

      # 5. Redirect index
      - name: Add Redirect Index 🔗
        run: |
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      # 6. Upload artifact
      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # 7. Deploy
      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v4
