name: Deploy DocC

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-14

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout репозиторію
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Вибір Xcode
      - name: Select Xcode 🧰
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. Показ схем для дебагу
      - name: Show Schemes 🔍
        run: xcodebuild -list -quiet

      # 4. Генерація symbol graphs для HealthChecks
      - name: Generate symbol graphs for HealthChecks
        run: |
          echo "Generating symbol graphs for HealthChecks..."
          mkdir -p .build/symbol-graphs
          swift build --target HealthChecks --quiet \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc .build/symbol-graphs

      # 5. Мінімальна збірка HealthChecks для DocC
      - name: Build HealthChecks Target 🔨
        run: |
          echo "Building HealthChecks target for DocC..."
          swift build --target HealthChecks --quiet

      # 6. Build Documentation для HealthChecks
      - name: Build Documentation for HealthChecks 📚
        run: |
          echo "Generating DocC documentation..."
          xcodebuild docbuild \
            -scheme fs-app-health-checks \
            -destination 'platform=macOS' \
            OTHER_DOCC_FLAGS="--additional-symbol-graph-dir .build/symbol-graphs --transform-for-static-hosting --hosting-base-path fs-app-health-checks" \
            DOCC_OUTPUT_DIR=./docs \
            -quiet

      # 7. Додаємо redirect index для GitHub Pages
      - name: Add Redirect Index 🔗
        run: |
          mkdir -p docs
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      # 8. Завантаження артефакту
      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # 9. Деплой на GitHub Pages
      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v4
