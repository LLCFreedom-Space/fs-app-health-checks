name: Deploy DocC

on:
  push:
    branches: ["docc"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-14

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Build DocC using Plugin 🛠
        run: |
          TMP_DOCS=$(mktemp -d)
          echo "Using temporary docs folder: $TMP_DOCS"

          # Знаходимо всі targets з .docc каталогами
          TARGETS=$(find Sources -name '*.docc' -exec dirname {} \; | awk -F/ '{print $(NF-1)}' | sort -u)
          echo "Detected DocC targets: $TARGETS"

          for target in $TARGETS; do
            echo "📚 Building documentation for $target"

            swift package generate-documentation \
              --target "$target" \
              --disable-indexing \
              --transform-for-static-hosting \
              --hosting-base-path fs-app-health-checks \
              --output-path "$TMP_DOCS/$target" \
              --quiet
          done

          # Копіюємо всі docc в docs/
          rm -rf docs
          mkdir -p docs
          cp -R "$TMP_DOCS"/* docs/

          # Додаємо редірект на index.html
          echo "<script>window.location.href += '/documentation/healthchecks'</script>" > docs/index.html

      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
