name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

# =========================
# macOS (Xcode)
# =========================
  macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-spm-

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test

# =========================
# Linux (Docker services)
# =========================
  linux:
    runs-on: ubuntu-latest

    container:
      image: swift:6.2-jammy

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vapor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vapor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Wait for services (important fix)
      # =========================
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h postgres -U postgres && break
            sleep 2
          done

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            redis-cli -h redis ping && break
            sleep 2
          done

      - name: Wait for Mongo
        run: |
          for i in {1..30}; do
            mongosh --host mongo --quiet --eval "db.runCommand({ ping: 1 })" && break
            sleep 2
          done

      # =========================
      # Cache SwiftPM (fixed key)
      # =========================
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-spm-

      # =========================
      # Build & Test
      # =========================
      - name: Build
        run: swift build -v

      - name: Run tests
#        run: swift test
        run: swift test -v --enable-code-coverage
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DB: vapor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST: redis
          REDIS_PORT: 6379
          MONGO_HOST: mongo
          MONGO_PORT: 27017
          MONGO_DB: vapor_test
      - name: Fetch Coverage
        id: coverage-files
        uses: sersoft-gmbh/swift-coverage-action@v4
      - name: Publish Coverage to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage-files.outputs.files }}
