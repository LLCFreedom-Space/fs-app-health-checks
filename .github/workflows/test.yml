# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================
  # macOS
  # =========================
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Build
        run: swift build -v
      - name: Run tests
        run: swift test
  # =========================
  # Linux
  # =========================
  linux:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vapor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:8
        env:
          MONGO_DB: vapor_test
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ matrix.swift-version }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            linux-spm-
      - name: Build
        run: swift build -v
      - name: Run tests
        run: swift test
        env:
          POSTGRES_HOST: postgres
          POSTGRES_DB: vapor_test
          REDIS_HOST: redis
          MONGO_HOST: mongo
          MONGO_DB: vapor_test
