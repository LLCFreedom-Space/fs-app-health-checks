name: Lint code

on:
  push:

concurrency:
  group: "linting"
  cancel-in-progress: true

jobs:
  SwiftLint:
    runs-on: macOS-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Verify SwiftLint version
        run: swiftlint version

      - name: Run SwiftLint
        run: swiftlint --config .swiftlint.yml
